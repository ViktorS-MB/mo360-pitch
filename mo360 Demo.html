  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <style>
    html, body, #root { margin: 0; padding: 0; min-height: 100vh; background: #000; color: #F0F0F0; }
    body { font-family: 'DM Sans', 'Helvetica Neue', sans-serif; -webkit-font-smoothing: antialiased; }
    #loading {
      position: fixed; inset: 0; background: #000; color: #C4A882;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 20px;
      font-family: 'DM Sans', sans-serif; letter-spacing: 4px; z-index: 9999;
      transition: opacity 0.4s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #loading .star { font-size: 36px; color: #C4C4C4; animation: pulse 2s infinite; }
    #loading .title { font-size: 20px; font-weight: 300; }
    #loading .sub { font-size: 10px; color: #7A7A7A; letter-spacing: 3px; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  </style>
</head>
<body>
  <div id="loading">
    <span class="star">✦</span>
    <div class="title">MO360 Malfunction</div>
    <div class="sub">LOADING DEMO ENVIRONMENT…</div>
  </div>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <script>
    window.addEventListener("load", () => {
      const checkMounted = setInterval(() => {
        const r = document.getElementById("root");
        if (r && r.children.length > 0) {
          document.getElementById("loading").classList.add("hidden");
          setTimeout(() => document.getElementById("loading").remove(), 500);
          clearInterval(checkMounted);
        }
      }, 100);
      setTimeout(() => {
        const el = document.getElementById("loading");
        if (el) el.classList.add("hidden");
      }, 12000);
    });
  </script>

  <script type="text/babel" data-presets="react">

// ─── THREE.JS CAR COMPONENT ───────────────────────────────────────────────────
function Car3D({ activePartId, onPartClick, roleColor }) {
  const mountRef = useRef(null);
  const sceneRef = useRef(null);
  const rendererRef = useRef(null);
  const cameraRef = useRef(null);
  const meshesRef = useRef({});
  const animFrameRef = useRef(null);
  const mouseRef = useRef({ x: 0, y: 0 });
  const isDragging = useRef(false);
  const lastMouse = useRef({ x: 0, y: 0 });
  const rotationRef = useRef({ x: 0.15, y: -0.4 });
  const targetRotRef = useRef({ x: 0.15, y: -0.4 });
  const zoomRef = useRef(5.5);

  const PARTS = useMemo(() => [
    { id: "body", label: "Body Shell", pph: 0.4, status: "ok" },
    { id: "roof", label: "Roof", pph: 0.3, status: "ok" },
    { id: "hood", label: "Hood", pph: 0.6, status: "ok" },
    { id: "trunk", label: "Trunk", pph: 0.5, status: "ok" },
    { id: "frontLeft", label: "Front Door L", pph: 1.2, status: "warn" },
    { id: "frontRight", label: "Front Door R", pph: 1.1, status: "warn" },
    { id: "rearLeft", label: "Rear Door L", pph: 0.8, status: "ok" },
    { id: "rearRight", label: "Rear Door R", pph: 0.7, status: "ok" },
    { id: "windshield", label: "Windshield", pph: 0.2, status: "ok" },
    { id: "wheel_fl", label: "Wheel FL", pph: 2.0, status: "critical" },
    { id: "wheel_fr", label: "Wheel FR", pph: 1.9, status: "critical" },
    { id: "wheel_rl", label: "Wheel RL", pph: 1.5, status: "warn" },
    { id: "wheel_rr", label: "Wheel RR", pph: 1.4, status: "warn" },
    { id: "interior", label: "Interior", pph: 1.9, status: "critical" },
    { id: "mirror_l", label: "Mirror L", pph: 0.6, status: "ok" },
    { id: "mirror_r", label: "Mirror R", pph: 0.6, status: "ok" },
  ], []);

  const getStatusColor = useCallback((status, hex = false) => {
    const colors = { ok: 0x27AE60, warn: 0xE67E22, critical: 0xC0392B };
    const hexColors = { ok: "#27AE60", warn: "#E67E22", critical: "#C0392B" };
    return hex ? hexColors[status] : colors[status];
  }, []);

  useEffect(() => {
    const el = mountRef.current;
    if (!el) return;

    // Scene
    const scene = new THREE.Scene();
    scene.background = null;
    sceneRef.current = scene;

    // Camera
    const camera = new THREE.PerspectiveCamera(35, el.clientWidth / el.clientHeight, 0.1, 100);
    camera.position.set(0, 1.5, zoomRef.current);
    cameraRef.current = camera;

    // Renderer
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(el.clientWidth, el.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    el.appendChild(renderer.domElement);
    rendererRef.current = renderer;

    // Lights
    const ambient = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambient);
    const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
    keyLight.position.set(5, 8, 5);
    keyLight.castShadow = true;
    scene.add(keyLight);
    const fillLight = new THREE.DirectionalLight(0x8BAECC, 0.5);
    fillLight.position.set(-5, 3, -3);
    scene.add(fillLight);
    const rimLight = new THREE.DirectionalLight(0xC4A882, 0.8);
    rimLight.position.set(0, -2, -6);
    scene.add(rimLight);
    const topLight = new THREE.DirectionalLight(0xffffff, 0.6);
    topLight.position.set(0, 10, 0);
    scene.add(topLight);

    // Ground reflection plane
    const groundGeo = new THREE.PlaneGeometry(20, 20);
    const groundMat = new THREE.MeshStandardMaterial({
      color: 0x111111, metalness: 0.8, roughness: 0.2, transparent: true, opacity: 0.6
    });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.8;
    ground.receiveShadow = true;
    scene.add(ground);

    // Grid lines on ground
    const gridHelper = new THREE.GridHelper(10, 20, 0x222222, 0x1A1A1A);
    gridHelper.position.y = -0.79;
    scene.add(gridHelper);

    // ── BUILD CAR ──
    const carGroup = new THREE.Group();
    scene.add(carGroup);

    const bodyMat = new THREE.MeshStandardMaterial({
      color: 0x1A1A1A, metalness: 0.9, roughness: 0.1,
      envMapIntensity: 1.2,
    });
    const glassMat = new THREE.MeshStandardMaterial({
      color: 0x8BAECC, metalness: 0.1, roughness: 0.0,
      transparent: true, opacity: 0.35,
    });
    const wheelMat = new THREE.MeshStandardMaterial({
      color: 0x111111, metalness: 0.5, roughness: 0.5,
    });
    const rimMat = new THREE.MeshStandardMaterial({
      color: 0xC4C4C4, metalness: 0.95, roughness: 0.05,
    });
    const chromeMat = new THREE.MeshStandardMaterial({
      color: 0xE0E0E0, metalness: 1.0, roughness: 0.0,
    });

    const addMesh = (geo, mat, pos, rot, id, castShadow = true) => {
      const mesh = new THREE.Mesh(geo, mat.clone ? mat.clone() : mat);
      mesh.position.set(...pos);
      if (rot) mesh.rotation.set(...rot);
      if (castShadow) mesh.castShadow = true;
      mesh.userData = { partId: id };
      carGroup.add(mesh);
      if (id) {
        if (!meshesRef.current[id]) meshesRef.current[id] = [];
        meshesRef.current[id].push(mesh);
      }
      return mesh;
    };

    // Body lower
    const bodyGeo = new THREE.BoxGeometry(4.2, 0.55, 1.85);
    bodyGeo.translate(0, 0, 0);
    addMesh(bodyGeo, bodyMat, [0, 0, 0], null, "body");

    // Body upper (cabin)
    const cabinGeo = new THREE.BoxGeometry(2.4, 0.5, 1.7);
    addMesh(cabinGeo, bodyMat, [-0.1, 0.52, 0], null, "roof");

    // Cabin shape refinement - tapered top
    const cabinTopGeo = new THREE.BoxGeometry(1.8, 0.15, 1.6);
    addMesh(cabinTopGeo, bodyMat, [-0.2, 0.77, 0], null, "roof");

    // Hood
    const hoodGeo = new THREE.BoxGeometry(1.35, 0.08, 1.75);
    addMesh(hoodGeo, bodyMat, [1.42, 0.3, 0], null, "hood");

    // Trunk
    const trunkGeo = new THREE.BoxGeometry(0.85, 0.22, 1.75);
    addMesh(trunkGeo, bodyMat, [-1.72, 0.18, 0], null, "trunk");

    // Front bumper
    const fBumperGeo = new THREE.BoxGeometry(0.18, 0.35, 1.82);
    addMesh(fBumperGeo, bodyMat, [2.1, -0.07, 0], null, "body");

    // Rear bumper
    const rBumperGeo = new THREE.BoxGeometry(0.18, 0.3, 1.82);
    addMesh(rBumperGeo, bodyMat, [-2.1, -0.07, 0], null, "trunk");

    // Windshield
    const windshieldGeo = new THREE.BoxGeometry(0.05, 0.52, 1.55);
    addMesh(windshieldGeo, glassMat, [1.05, 0.52, 0], [0, 0, 0.45], "windshield");

    // Rear window
    const rWindowGeo = new THREE.BoxGeometry(0.05, 0.4, 1.5);
    addMesh(rWindowGeo, glassMat, [-1.08, 0.5, 0], [0, 0, -0.45], "windshield");

    // Side windows L
    const sWindowLGeo = new THREE.BoxGeometry(1.9, 0.32, 0.04);
    addMesh(sWindowLGeo, glassMat, [-0.05, 0.6, 0.87], null, "frontLeft");

    // Side windows R
    const sWindowRGeo = new THREE.BoxGeometry(1.9, 0.32, 0.04);
    addMesh(sWindowRGeo, glassMat, [-0.05, 0.6, -0.87], null, "frontRight");

    // Door lines (front left)
    const doorFlGeo = new THREE.BoxGeometry(1.05, 0.52, 0.04);
    addMesh(doorFlGeo, bodyMat, [0.6, -0.02, 0.945], null, "frontLeft");
    // Door lines (front right)
    const doorFrGeo = new THREE.BoxGeometry(1.05, 0.52, 0.04);
    addMesh(doorFrGeo, bodyMat, [0.6, -0.02, -0.945], null, "frontRight");
    // Rear left door
    const doorRlGeo = new THREE.BoxGeometry(1.0, 0.52, 0.04);
    addMesh(doorRlGeo, bodyMat, [-0.55, -0.02, 0.945], null, "rearLeft");
    // Rear right door
    const doorRrGeo = new THREE.BoxGeometry(1.0, 0.52, 0.04);
    addMesh(doorRrGeo, bodyMat, [-0.55, -0.02, -0.945], null, "rearRight");

    // Mirrors
    const mirrorGeo = new THREE.BoxGeometry(0.15, 0.08, 0.28);
    addMesh(mirrorGeo, chromeMat, [0.8, 0.35, 1.02], null, "mirror_l");
    addMesh(mirrorGeo, chromeMat, [0.8, 0.35, -1.02], null, "mirror_r");

    // Headlights
    const headlightGeo = new THREE.BoxGeometry(0.25, 0.12, 0.55);
    const hlMat = new THREE.MeshStandardMaterial({ color: 0xE8E0C0, emissive: 0x443322, metalness: 0.3, roughness: 0.1 });
    addMesh(headlightGeo, hlMat, [2.1, 0.18, 0.62], null, "body");
    addMesh(headlightGeo, hlMat, [2.1, 0.18, -0.62], null, "body");

    // Taillights
    const taillightGeo = new THREE.BoxGeometry(0.12, 0.18, 0.65);
    const tlMat = new THREE.MeshStandardMaterial({ color: 0x8B0000, emissive: 0x330000, metalness: 0.2, roughness: 0.3 });
    addMesh(taillightGeo, tlMat, [-2.12, 0.15, 0.6], null, "trunk");
    addMesh(taillightGeo, tlMat, [-2.12, 0.15, -0.6], null, "trunk");

    // Chrome grill
    const grillGeo = new THREE.BoxGeometry(0.06, 0.22, 1.4);
    addMesh(grillGeo, chromeMat, [2.16, 0.05, 0], null, "body");

    // Roof bars chrome
    const roofBarGeo = new THREE.BoxGeometry(2.2, 0.04, 0.05);
    addMesh(roofBarGeo, chromeMat, [-0.15, 0.78, 0.88], null, "roof");
    addMesh(roofBarGeo, chromeMat, [-0.15, 0.78, -0.88], null, "roof");

    // Interior (invisible but raycasted)
    const intGeo = new THREE.BoxGeometry(2.2, 0.4, 1.6);
    const intMat = new THREE.MeshStandardMaterial({ color: 0x2A1A0A, metalness: 0.1, roughness: 0.8, transparent: true, opacity: 0.01 });
    addMesh(intGeo, intMat, [-0.05, 0.3, 0], null, "interior");

    // ── WHEELS ──
    const wheelPositions = [
      { id: "wheel_fl", pos: [1.25, -0.55, 1.0] },
      { id: "wheel_fr", pos: [1.25, -0.55, -1.0] },
      { id: "wheel_rl", pos: [-1.25, -0.55, 1.0] },
      { id: "wheel_rr", pos: [-1.25, -0.55, -1.0] },
    ];

    wheelPositions.forEach(({ id, pos }) => {
      const wGroup = new THREE.Group();
      wGroup.position.set(...pos);
      wGroup.userData = { partId: id };

      // Tire
      const tireGeo = new THREE.TorusGeometry(0.38, 0.12, 16, 32);
      const tireMesh = new THREE.Mesh(tireGeo, wheelMat.clone());
      tireMesh.rotation.y = Math.PI / 2;
      tireMesh.userData = { partId: id };
      tireMesh.castShadow = true;
      wGroup.add(tireMesh);

      // Rim face
      const rimGeo = new THREE.CylinderGeometry(0.28, 0.28, 0.08, 16);
      const rimMesh = new THREE.Mesh(rimGeo, rimMat.clone());
      rimMesh.rotation.z = Math.PI / 2;
      rimMesh.userData = { partId: id };
      rimMesh.castShadow = true;
      wGroup.add(rimMesh);

      // Spokes
      for (let s = 0; s < 5; s++) {
        const spokeGeo = new THREE.BoxGeometry(0.04, 0.52, 0.06);
        const spMesh = new THREE.Mesh(spokeGeo, rimMat.clone());
        spMesh.rotation.z = Math.PI / 2;
        spMesh.rotation.y = (s / 5) * Math.PI * 2;
        spMesh.position.set(pos[2] > 0 ? 0.05 : -0.05, 0, 0);
        spMesh.userData = { partId: id };
        wGroup.add(spMesh);
      }

      // Brake disc hint
      const discGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.04, 16);
      const discMat = new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.7, roughness: 0.4 });
      const discMesh = new THREE.Mesh(discGeo, discMat);
      discMesh.rotation.z = Math.PI / 2;
      discMesh.userData = { partId: id };
      wGroup.add(discMesh);

      carGroup.add(wGroup);
      if (!meshesRef.current[id]) meshesRef.current[id] = [];
      meshesRef.current[id].push(tireMesh, rimMesh, discMesh);
    });

    // ── PART COLORING BY STATUS ──
    const updatePartColors = (activePart) => {
      PARTS.forEach(part => {
        const meshes = meshesRef.current[part.id];
        if (!meshes) return;
        meshes.forEach(m => {
          if (!m.material) return;
          const isActive = activePart === part.id;
          const col = isActive ? 0xC4A882 :
            (part.status === "critical" ? 0xC0392B :
              part.status === "warn" ? 0xE67E22 : null);

          if (part.status === "ok" && !isActive) {
            m.material.emissive = new THREE.Color(0x000000);
            m.material.emissiveIntensity = 0;
          } else if (col) {
            m.material.emissive = new THREE.Color(col);
            m.material.emissiveIntensity = isActive ? 0.5 : 0.25;
          }
        });
      });
    };

    updatePartColors(null);

    // Raycaster for click
    const raycaster = new THREE.Raycaster();
    const handleClick = (e) => {
      if (!el) return;
      const rect = el.getBoundingClientRect();
      const x = ((e.clientX - rect.left) / el.clientWidth) * 2 - 1;
      const y = -((e.clientY - rect.top) / el.clientHeight) * 2 + 1;
      raycaster.setFromCamera({ x, y }, camera);
      const allMeshes = [];
      carGroup.traverse(obj => { if (obj.isMesh) allMeshes.push(obj); });
      const hits = raycaster.intersectObjects(allMeshes);
      if (hits.length > 0) {
        const pid = hits[0].object.userData.partId;
        if (pid) onPartClick(pid);
      }
    };

    // Mouse events
    const onMouseDown = (e) => {
      isDragging.current = false;
      lastMouse.current = { x: e.clientX, y: e.clientY };
    };
    const onMouseMove = (e) => {
      if (e.buttons === 1) {
        isDragging.current = true;
        const dx = e.clientX - lastMouse.current.x;
        const dy = e.clientY - lastMouse.current.y;
        targetRotRef.current.y += dx * 0.008;
        targetRotRef.current.x += dy * 0.004;
        targetRotRef.current.x = Math.max(-0.5, Math.min(0.5, targetRotRef.current.x));
        lastMouse.current = { x: e.clientX, y: e.clientY };
      }
    };
    const onMouseUp = (e) => {
      if (!isDragging.current) handleClick(e);
    };
    const onWheel = (e) => {
      zoomRef.current = Math.max(3, Math.min(10, zoomRef.current + e.deltaY * 0.005));
    };

    el.addEventListener("mousedown", onMouseDown);
    el.addEventListener("mousemove", onMouseMove);
    el.addEventListener("mouseup", onMouseUp);
    el.addEventListener("wheel", onWheel);

    // Touch
    let lastTouchX = 0;
    const onTouchStart = (e) => { lastTouchX = e.touches[0].clientX; };
    const onTouchMove = (e) => {
      const dx = e.touches[0].clientX - lastTouchX;
      targetRotRef.current.y += dx * 0.01;
      lastTouchX = e.touches[0].clientX;
    };
    el.addEventListener("touchstart", onTouchStart);
    el.addEventListener("touchmove", onTouchMove);

    // Animate
    const animate = () => {
      animFrameRef.current = requestAnimationFrame(animate);
      rotationRef.current.x += (targetRotRef.current.x - rotationRef.current.x) * 0.08;
      rotationRef.current.y += (targetRotRef.current.y - rotationRef.current.y) * 0.08;
      carGroup.rotation.x = rotationRef.current.x;
      carGroup.rotation.y = rotationRef.current.y;
      camera.position.z += (zoomRef.current - camera.position.z) * 0.08;
      renderer.render(scene, camera);
    };
    animate();

    // Resize
    const onResize = () => {
      if (!el) return;
      camera.aspect = el.clientWidth / el.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(el.clientWidth, el.clientHeight);
    };
    window.addEventListener("resize", onResize);

    return () => {
      cancelAnimationFrame(animFrameRef.current);
      el.removeEventListener("mousedown", onMouseDown);
      el.removeEventListener("mousemove", onMouseMove);
      el.removeEventListener("mouseup", onMouseUp);
      el.removeEventListener("wheel", onWheel);
      el.removeEventListener("touchstart", onTouchStart);
      el.removeEventListener("touchmove", onTouchMove);
      window.removeEventListener("resize", onResize);
      if (el.contains(renderer.domElement)) el.removeChild(renderer.domElement);
      renderer.dispose();
    };
  }, []);

  // Update active part highlight
  useEffect(() => {
    PARTS.forEach(part => {
      const meshes = meshesRef.current[part.id];
      if (!meshes) return;
      meshes.forEach(m => {
        if (!m.material) return;
        if (activePartId === part.id) {
          m.material.emissive = new THREE.Color(0xC4A882);
          m.material.emissiveIntensity = 0.6;
        } else if (part.status === "critical") {
          m.material.emissive = new THREE.Color(0xC0392B);
          m.material.emissiveIntensity = 0.3;
        } else if (part.status === "warn") {
          m.material.emissive = new THREE.Color(0xE67E22);
          m.material.emissiveIntensity = 0.2;
        } else {
          m.material.emissive = new THREE.Color(0x000000);
          m.material.emissiveIntensity = 0;
        }
      });
    });
  }, [activePartId]);

  const activePart = PARTS.find(p => p.id === activePartId);

  return (
    <div style={{ position: "relative", width: "100%", height: "100%" }}>
      <div ref={mountRef} style={{ width: "100%", height: "100%", cursor: "grab" }} />
      {/* Part legend */}
      <div style={{ position: "absolute", top: 12, left: 12, display: "flex", flexDirection: "column", gap: 4 }}>
        {[{ c: MB.red, l: "Critical" }, { c: MB.amber, l: "Warning" }, { c: MB.green, l: "OK" }].map(s => (
          <div key={s.l} style={{ display: "flex", alignItems: "center", gap: 6 }}>
            <div style={{ width: 8, height: 8, borderRadius: "50%", background: s.c, boxShadow: `0 0 6px ${s.c}` }} />
            <span style={{ fontSize: 10, color: MB.textMuted, letterSpacing: 1 }}>{s.l.toUpperCase()}</span>
          </div>
        ))}
      </div>
      {/* Controls hint */}
      <div style={{ position: "absolute", bottom: 12, right: 12, color: MB.textSubtle, fontSize: 10, textAlign: "right" }}>
        Drag to rotate · Scroll to zoom · Click part to inspect
      </div>
      {/* Active part popup */}
      {activePart && (
        <div style={{
          position: "absolute", top: 12, right: 12,
          background: MB.surfaceCard, border: `1px solid ${MB.borderLight}`,
          borderLeft: `3px solid ${activePart.status === "critical" ? MB.red : activePart.status === "warn" ? MB.amber : MB.green}`,
          borderRadius: 8, padding: "12px 16px",
          minWidth: 160,
          boxShadow: "0 8px 32px rgba(0,0,0,0.6)",
          animation: "fadeUp 0.2s ease",
        }}>
          <div style={{ fontSize: 10, color: MB.textMuted, letterSpacing: 1.5, marginBottom: 4 }}>SELECTED PART</div>
          <div style={{ fontSize: 15, fontWeight: 600, color: MB.white }}>{activePart.label}</div>
          <div style={{ fontSize: 22, fontWeight: 700, color: MB.white, marginTop: 4 }}>
            {activePart.pph}<span style={{ fontSize: 11, color: MB.textMuted, marginLeft: 4 }}>pph</span>
          </div>
          <div style={{ fontSize: 10, color: activePart.status === "critical" ? MB.red : activePart.status === "warn" ? MB.amber : MB.green, marginTop: 4, letterSpacing: 1 }}>
            ● {activePart.status.toUpperCase()}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── VERBATIM CLUSTER CANVAS ──────────────────────────────────────────────────
function VerbatimClusters({ onClusterClick, activeCluster }) {
  const canvasRef = useRef(null);
  const [hovered, setHovered] = useState(null);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const W = canvas.width;
    const H = canvas.height;

    const draw = () => {
      ctx.clearRect(0, 0, W, H);

      // Background subtle grid
      ctx.strokeStyle = "rgba(255,255,255,0.03)";
      ctx.lineWidth = 1;
      for (let x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
      for (let y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

      VERBATIM_CLUSTERS.forEach(cluster => {
        const cx = cluster.x * W;
        const cy = cluster.y * H;
        const r = cluster.r;
        const isActive = activeCluster?.id === cluster.id;
        const isHov = hovered === cluster.id;

        const color = cluster.severity === "high" ? "#C0392B"
          : cluster.severity === "medium" ? "#E67E22" : "#C4A882";

        // Glow
        const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 1.4);
        grd.addColorStop(0, color + (isActive ? "55" : "22"));
        grd.addColorStop(1, "transparent");
        ctx.beginPath();
        ctx.arc(cx, cy, r * 1.4, 0, Math.PI * 2);
        ctx.fillStyle = grd;
        ctx.fill();

        // Circle
        ctx.beginPath();
        ctx.arc(cx, cy, r * (isActive || isHov ? 1.1 : 1), 0, Math.PI * 2);
        ctx.fillStyle = color + (isActive ? "44" : "22");
        ctx.fill();
        ctx.strokeStyle = color + (isActive ? "FF" : "88");
        ctx.lineWidth = isActive ? 2 : 1;
        ctx.stroke();

        // Count label
        ctx.fillStyle = isActive ? "#fff" : color;
        ctx.font = `bold ${Math.max(12, r * 0.4)}px "DM Sans", sans-serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(cluster.count, cx, cy - 4);

        // Label text
        ctx.fillStyle = isActive ? "#fff" : "#8A8A8A";
        ctx.font = `${Math.max(9, r * 0.25)}px "DM Sans", sans-serif`;
        ctx.fillText(cluster.label, cx, cy + r * 0.4);
      });
    };

    draw();
  }, [hovered, activeCluster]);

  const handleMouseMove = (e) => {
    const rect = canvasRef.current.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (canvasRef.current.width / rect.width);
    const my = (e.clientY - rect.top) * (canvasRef.current.height / rect.height);
    let found = null;
    VERBATIM_CLUSTERS.forEach(c => {
      const dx = c.x * canvasRef.current.width - mx;
      const dy = c.y * canvasRef.current.height - my;
      if (Math.sqrt(dx * dx + dy * dy) < c.r) found = c.id;
    });
    setHovered(found);
  };

  const handleClick = (e) => {
    const rect = canvasRef.current.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (canvasRef.current.width / rect.width);
    const my = (e.clientY - rect.top) * (canvasRef.current.height / rect.height);
    VERBATIM_CLUSTERS.forEach(c => {
      const dx = c.x * canvasRef.current.width - mx;
      const dy = c.y * canvasRef.current.height - my;
      if (Math.sqrt(dx * dx + dy * dy) < c.r) onClusterClick(c);
    });
  };

  return (
    <div style={{ position: "relative", width: "100%", height: "100%" }}>
      <canvas
        ref={canvasRef}
        width={800} height={380}
        style={{ width: "100%", height: "100%", cursor: hovered ? "pointer" : "default" }}
        onMouseMove={handleMouseMove}
        onClick={handleClick}
      />
      {activeCluster && (
        <div style={{
          position: "absolute", bottom: 16, left: 16, right: 16,
          background: MB.surfaceCard, border: `1px solid ${MB.borderLight}`,
          borderRadius: 8, padding: "12px 16px",
          display: "flex", gap: 16, alignItems: "flex-start",
          animation: "fadeUp 0.2s ease",
        }}>
          <div>
            <div style={{ fontSize: 10, color: MB.textMuted, letterSpacing: 1.5 }}>CLUSTER · {activeCluster.label.toUpperCase()}</div>
            <div style={{ fontSize: 22, fontWeight: 700, color: MB.white }}>{activeCluster.count} <span style={{ fontSize: 11, color: MB.textMuted }}>verbatims</span></div>
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 10, color: MB.textMuted, marginBottom: 6 }}>TOP KEYWORDS</div>
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
              {activeCluster.keywords.map(k => (
                <span key={k} style={{
                  fontSize: 11, padding: "2px 8px",
                  background: MB.anthraciteLight, border: `1px solid ${MB.border}`,
                  borderRadius: 10, color: MB.silver,
                }}>{k}</span>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── TIMELINE SCRUBBER ────────────────────────────────────────────────────────
function TimelineScrubber({ scrubberDay, setScrubberDay }) {
  const canvasRef = useRef(null);
  const isDragging = useRef(false);

  const getX = (day, W) => (day / 89) * (W - 60) + 30;

  const draw = useCallback(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const W = canvas.width;
    const H = canvas.height;
    ctx.clearRect(0, 0, W, H);

    // Background
    ctx.fillStyle = MB.surface;
    ctx.fillRect(0, 0, W, H);

    // Area fill under curve
    const areaGrd = ctx.createLinearGradient(0, 0, 0, H - 40);
    areaGrd.addColorStop(0, "rgba(196,168,130,0.15)");
    areaGrd.addColorStop(1, "rgba(196,168,130,0)");
    ctx.beginPath();
    ctx.moveTo(getX(0, W), H - 40);
    TIMELINE_PPH.forEach((v, i) => {
      const x = getX(i, W);
      const y = H - 40 - (v / 3.5) * (H - 70);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.lineTo(getX(89, W), H - 40);
    ctx.closePath();
    ctx.fillStyle = areaGrd;
    ctx.fill();

    // PPH line
    ctx.beginPath();
    ctx.strokeStyle = MB.accent;
    ctx.lineWidth = 2;
    TIMELINE_PPH.forEach((v, i) => {
      const x = getX(i, W);
      const y = H - 40 - (v / 3.5) * (H - 70);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();

    // Before/after shade
    const scrubX = getX(scrubberDay, W);
    ctx.fillStyle = "rgba(255,255,255,0.02)";
    ctx.fillRect(scrubX, 0, W - scrubX, H - 30);

    // CR events
    CR_EVENTS.forEach(ev => {
      const x = getX(ev.date, W);
      const col = ev.impact === "high" ? MB.red : ev.impact === "medium" ? MB.amber : MB.accent;
      ctx.strokeStyle = col + "88";
      ctx.lineWidth = 1.5;
      ctx.setLineDash([3, 3]);
      ctx.beginPath();
      ctx.moveTo(x, 10);
      ctx.lineTo(x, H - 40);
      ctx.stroke();
      ctx.setLineDash([]);

      // Tag
      ctx.fillStyle = col + "22";
      ctx.strokeStyle = col;
      ctx.lineWidth = 1;
      const lbl = ev.id;
      const tw = ctx.measureText(lbl).width + 10;
      ctx.beginPath();
      ctx.roundRect(x - tw / 2, 4, tw, 16, 3);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = col;
      ctx.font = "9px 'DM Sans', sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(lbl, x, 12);
    });

    // Scrubber line
    ctx.strokeStyle = MB.white;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(scrubX, 0);
    ctx.lineTo(scrubX, H - 30);
    ctx.stroke();

    // Scrubber handle
    ctx.beginPath();
    ctx.arc(scrubX, H - 38, 7, 0, Math.PI * 2);
    ctx.fillStyle = MB.white;
    ctx.fill();

    // Day label
    ctx.fillStyle = MB.white;
    ctx.font = "bold 11px 'DM Sans', sans-serif";
    ctx.textAlign = "center";
    ctx.fillText(`Day ${scrubberDay}`, scrubX, H - 16);

    // Axis labels
    ctx.fillStyle = MB.textSubtle;
    ctx.font = "9px 'DM Sans', sans-serif";
    ["0", "30d", "60d", "90d"].forEach((l, i) => {
      ctx.textAlign = "center";
      ctx.fillText(l, getX(i * 30, W), H - 6);
    });

    // PPH at scrubber
    const currentPPH = TIMELINE_PPH[scrubberDay] || 0;
    ctx.fillStyle = MB.accent;
    ctx.font = "bold 13px 'DM Sans', sans-serif";
    ctx.textAlign = scrubX > W - 80 ? "right" : "left";
    ctx.fillText(`${currentPPH.toFixed(2)} pph`, scrubX + (scrubX > W - 80 ? -10 : 10), 30);
  }, [scrubberDay]);

  useEffect(() => { draw(); }, [draw]);

  const updateFromEvent = (e) => {
    const rect = canvasRef.current.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (canvasRef.current.width / rect.width);
    const W = canvasRef.current.width;
    const day = Math.round(((mx - 30) / (W - 60)) * 89);
    setScrubberDay(Math.max(0, Math.min(89, day)));
  };

  return (
    <canvas
      ref={canvasRef}
      width={900} height={160}
      style={{ width: "100%", height: 160, cursor: "ew-resize", display: "block" }}
      onMouseDown={(e) => { isDragging.current = true; updateFromEvent(e); }}
      onMouseMove={(e) => { if (isDragging.current) updateFromEvent(e); }}
      onMouseUp={() => { isDragging.current = false; }}
      onMouseLeave={() => { isDragging.current = false; }}
    />
  );
}

// ─── KPI CARD ─────────────────────────────────────────────────────────────────
function KPICard({ kpi, accent }) {
  const pct = Math.min((kpi.value / kpi.max) * 100, 100);
  const col = kpi.status === "critical" ? MB.red : kpi.status === "warn" ? MB.amber : MB.green;
  return (
    <div style={{
      background: MB.surfaceCard,
      border: `1px solid ${kpi.status !== "good" ? col + "33" : MB.border}`,
      borderRadius: 8,
      padding: "14px 16px",
      position: "relative",
      overflow: "hidden",
      transition: "all 0.2s ease",
      cursor: "default",
    }}
    onMouseEnter={e => e.currentTarget.style.borderColor = col + "66"}
    onMouseLeave={e => e.currentTarget.style.borderColor = kpi.status !== "good" ? col + "33" : MB.border}
    >
      {kpi.status === "critical" && (
        <div style={{ position: "absolute", top: 8, right: 8, width: 6, height: 6, borderRadius: "50%", background: MB.red, animation: "pulse 1.5s infinite" }} />
      )}
      <div style={{ fontSize: 9, color: MB.textMuted, letterSpacing: 2, textTransform: "uppercase", marginBottom: 8 }}>{kpi.label}</div>
      <div style={{ fontSize: 26, fontWeight: 700, color: MB.white, lineHeight: 1 }}>
        {kpi.value}<span style={{ fontSize: 11, color: MB.textMuted, marginLeft: 3 }}>{kpi.unit}</span>
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 10 }}>
        <div style={{ flex: 1, height: 2, background: MB.anthraciteLight, borderRadius: 1 }}>
          <div style={{ height: "100%", width: `${pct}%`, background: col, borderRadius: 1, transition: "width 0.8s ease" }} />
        </div>
        <span style={{ fontSize: 10, color: kpi.trend === 0 ? MB.textMuted : (kpi.trend > 0 ? MB.red : MB.green), marginLeft: 10, whiteSpace: "nowrap" }}>
          {kpi.trend > 0 ? "▲" : kpi.trend < 0 ? "▼" : "—"} {Math.abs(kpi.trend)}{kpi.unit}
        </span>
      </div>
    </div>
  );
}

• **Top Keywords**: ${contextCluster.keywords.join(", ")}
• **Geo**: 64% AE, 21% EU, 15% andere

  }
  return `${partInfo}${clusterInfo}Verstanden — "${input}" im Kontext ${roleTitle}.

In der Live-Version würde MO360 Malfunction jetzt:
• Verbatim-Datenbank durchsuchen (~12k Einträge)
• Korrelationen mit Sensordaten berechnen
• Relevante CRs aggregieren

// ─── CHAT ─────────────────────────────────────────────────────────────────────
function AIChat({ role, contextPart, contextCluster }) {
  const [messages, setMessages] = useState([{
    role: "assistant",
    content: `MO360 Malfunction bereit — Kontext: ${role?.title || "System"}. S-Class W223, Plant Vitoria, Market AE.\n\nWas möchten Sie analysieren?`
  }]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const endRef = useRef(null);

  useEffect(() => { endRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

  const quickPrompts = [
    contextPart ? `${contextPart} Ursachenanalyse` : "Top Anomalien",
    contextCluster ? `${contextCluster.label} Cluster deep dive` : "Korrelationen zeigen",
    "Maßnahmen priorisieren",
    "Executive Summary",
  ];

  const send = async (text) => {
    const msg = text || input.trim();
    if (!msg || loading) return;
    setInput("");
    const userMsg = { role: "user", content: msg };
    setMessages(prev => [...prev, userMsg]);
    setLoading(true);
    const lid = Date.now();
    setMessages(prev => [...prev, { role: "assistant", content: "", loading: true, id: lid }]);
    try {
      await new Promise(r => setTimeout(r, 600 + Math.random() * 500));
      const reply = generateDemoReply(msg, role, contextPart, contextCluster);
      setMessages(prev => prev.map(m => m.id === lid ? { role: "assistant", content: reply } : m));
    } catch {
      setMessages(prev => prev.map(m => m.id === lid ? { role: "assistant", content: "Demo-Fehler." } : m));
    }
    setLoading(false);
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
      {/* Header */}
      <div style={{ padding: "16px 20px", borderBottom: `1px solid ${MB.border}`, display: "flex", alignItems: "center", gap: 10 }}>
        <div style={{
          width: 32, height: 32, borderRadius: "50%",
          background: `linear-gradient(135deg, ${MB.accent}, #8B6914)`,
          display: "flex", alignItems: "center", justifyContent: "center",
          fontSize: 14, color: MB.black, fontWeight: 700,
        }}>◈</div>
        <div>
          <div style={{ fontSize: 12, fontWeight: 600, color: MB.white }}>MO360 Intelligence</div>
          <div style={{ fontSize: 9, color: MB.textMuted, letterSpacing: 1 }}>AI QUALITY ANALYST</div>
        </div>
        <div style={{ marginLeft: "auto", display: "flex", gap: 5, alignItems: "center" }}>
          <div style={{ width: 6, height: 6, borderRadius: "50%", background: MB.green, animation: "pulse 3s infinite" }} />
          <span style={{ fontSize: 9, color: MB.green, letterSpacing: 1 }}>LIVE</span>
        </div>
      </div>

      {/* Messages */}
      <div style={{ flex: 1, overflowY: "auto", padding: "16px 20px", display: "flex", flexDirection: "column", gap: 10 }}>
        {messages.map((m, i) => (
          <div key={i} style={{ display: "flex", justifyContent: m.role === "user" ? "flex-end" : "flex-start", gap: 8 }}>
            {m.role === "assistant" && (
              <div style={{ width: 24, height: 24, borderRadius: "50%", background: MB.anthraciteLight, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, flexShrink: 0, marginTop: 2 }}>◈</div>
            )}
            <div style={{
              maxWidth: "82%",
              background: m.role === "user" ? MB.anthraciteLight : MB.surfaceCard,
              border: `1px solid ${m.role === "user" ? MB.borderLight : MB.border}`,
              borderRadius: m.role === "user" ? "12px 12px 2px 12px" : "12px 12px 12px 2px",
              padding: "9px 13px",
              fontSize: 12, color: MB.text, lineHeight: 1.55, whiteSpace: "pre-wrap",
            }}>
              {m.content}{m.loading && <span style={{ animation: "blink 1s infinite", color: MB.accent }}>▊</span>}
            </div>
          </div>
        ))}
        <div ref={endRef} />
      </div>

      {/* Quick prompts */}
      <div style={{ padding: "0 20px 8px", display: "flex", gap: 5, flexWrap: "wrap" }}>
        {quickPrompts.map(p => (
          <button key={p} onClick={() => send(p)} style={{
            background: "transparent", border: `1px solid ${MB.border}`,
            borderRadius: 10, padding: "3px 9px",
            color: MB.textMuted, fontSize: 10, cursor: "pointer",
            fontFamily: "inherit", letterSpacing: 0.5, transition: "all 0.15s",
          }}
          onMouseEnter={e => { e.target.style.borderColor = MB.accent; e.target.style.color = MB.accent; }}
          onMouseLeave={e => { e.target.style.borderColor = MB.border; e.target.style.color = MB.textMuted; }}
          >{p}</button>
        ))}
      </div>

      {/* Input */}
      <div style={{ padding: "0 16px 16px", display: "flex", gap: 8 }}>
        <input
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => e.key === "Enter" && send()}
          placeholder="Analysefrage eingeben…"
          style={{
            flex: 1, background: MB.anthracite,
            border: `1px solid ${input ? MB.accent + "66" : MB.border}`,
            borderRadius: 8, padding: "9px 12px",
            color: MB.text, fontSize: 12, outline: "none",
            fontFamily: "inherit", transition: "border 0.2s",
          }}
        />
        <button onClick={() => send()} disabled={!input.trim() || loading} style={{
          width: 38, height: 38,
          background: !input.trim() || loading ? MB.anthracite : MB.accent,
          border: "none", borderRadius: 8, cursor: !input.trim() || loading ? "not-allowed" : "pointer",
          color: !input.trim() || loading ? MB.textSubtle : MB.black,
          fontSize: 16, fontWeight: 700, transition: "all 0.2s",
          flexShrink: 0,
        }}>→</button>
      </div>
    </div>
  );
}

function calcDataFactor(activeIds) {
  return SOURCE_BADGES
    .filter(b => activeIds.includes(b.id))
    .reduce((s, b) => s + b.weight, 0);
}

// Effective PPH = base * factor. Status is recomputed against thresholds when factor < 1.
function effectiveStatus(effPph, baseStatus, factor) {
  if (factor >= 0.99) return baseStatus;
  if (factor < 0.05)  return "ok"; // basically no data
  if (effPph > 1.7) return "critical";
  if (effPph > 1.0) return "warn";
  return "ok";
}

// Visual block: shows the part image if available, otherwise the SVG icon
function PartVisual({ part, accent, hover, size = "tile" }) {
  if (part.image) {
    return (
      <div style={{
        width: "100%", height: "100%",
        display: "flex", alignItems: "center", justifyContent: "center",
        position: "relative", overflow: "hidden",
      }}>
        <img src={part.image} alt={part.label} style={{
          maxWidth: "100%", maxHeight: "100%",
          objectFit: "contain",
          filter: hover ? "brightness(1.18) contrast(1.05)" : "brightness(1)",
          transition: "filter 0.2s ease",
          display: "block",
        }} />
      </div>
    );
  }
  return <PartIcon name={part.icon} color={hover ? accent : MB.silver} size={size === "detail" ? 50 : 70} />;
}

// ─── PART TILE ────────────────────────────────────────────────────────────────
function PartTile({ part, onClick, accent, factor }) {
  const [hov, setHov] = useState(false);
  const effPph = part.pph * factor;
  const effStatus = effectiveStatus(effPph, part.status, factor);
  const statusCol = effStatus === "critical" ? MB.red : effStatus === "warn" ? MB.amber : MB.green;
  const noData = factor < 0.05;
  return (
    <div onClick={() => onClick(part)}
      onMouseEnter={() => setHov(true)}
      onMouseLeave={() => setHov(false)}
      style={{
        background: hov ? MB.surfaceElevated : MB.surfaceCard,
        border: `1px solid ${hov ? accent + "55" : MB.border}`,
        borderRadius: 8,
        padding: 0,
        cursor: "pointer",
        transition: "all 0.18s ease",
        transform: hov ? "translateY(-2px)" : "translateY(0)",
        boxShadow: hov ? `0 8px 24px rgba(0,0,0,0.5), 0 0 16px ${statusCol}22` : "0 2px 8px rgba(0,0,0,0.3)",
        position: "relative",
        display: "flex",
        flexDirection: "column",
        minHeight: 170,
        overflow: "hidden",
      }}>
      <div style={{ position: "absolute", top: 10, right: 10, width: 7, height: 7, borderRadius: "50%", background: statusCol, boxShadow: `0 0 6px ${statusCol}`, zIndex: 2 }} />
      <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: part.image ? 8 : 14, minHeight: 100 }}>
        <PartVisual part={part} accent={accent} hover={hov} />
      </div>
      <div style={{
        borderTop: `1px solid ${MB.border}`,
        padding: "8px 12px 10px",
        textAlign: "center",
        background: "rgba(0,0,0,0.25)",
      }}>
        <div style={{ fontSize: 18, fontWeight: 700, color: noData ? MB.textSubtle : MB.white, lineHeight: 1 }}>
          {noData ? "—" : effPph.toFixed(1)}
          <span style={{ fontSize: 10, color: MB.textMuted, marginLeft: 3, fontWeight: 400 }}>pph</span>
        </div>
        <div style={{ fontSize: 9, color: MB.textMuted, letterSpacing: 1, marginTop: 4, textTransform: "uppercase" }}>
          {part.label}
        </div>
      </div>
    </div>
  );
}

    setActiveSources(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);

function PartTrendChart({ data, color }) {
  const canvasRef = useRef(null);
  useEffect(() => {
    const c = canvasRef.current;
    if (!c) return;
    const ctx = c.getContext("2d");
    const W = c.width, H = c.height;
    ctx.clearRect(0, 0, W, H);
    const max = Math.max(...data) * 1.1;
    const stepX = (W - 30) / (data.length - 1);
    ctx.strokeStyle = "rgba(255,255,255,0.04)";
    ctx.lineWidth = 1;
    for (let i = 0; i <= 4; i++) {
      const y = 10 + i * (H - 30) / 4;
      ctx.beginPath(); ctx.moveTo(15, y); ctx.lineTo(W - 5, y); ctx.stroke();
    }
    const grd = ctx.createLinearGradient(0, 0, 0, H - 20);
    grd.addColorStop(0, color + "44");
    grd.addColorStop(1, color + "00");
    ctx.beginPath();
    ctx.moveTo(15, H - 20);
    data.forEach((v, i) => {
      const x = 15 + i * stepX;
      const y = 10 + (1 - v / max) * (H - 30);
      ctx.lineTo(x, y);
    });
    ctx.lineTo(15 + (data.length - 1) * stepX, H - 20);
    ctx.closePath();
    ctx.fillStyle = grd;
    ctx.fill();
    ctx.beginPath();
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    data.forEach((v, i) => {
      const x = 15 + i * stepX;
      const y = 10 + (1 - v / max) * (H - 30);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();
    const lx = 15 + (data.length - 1) * stepX;
    const ly = 10 + (1 - data[data.length-1] / max) * (H - 30);
    ctx.beginPath(); ctx.arc(lx, ly, 4, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
  }, [data, color]);
  return <canvas ref={canvasRef} width={520} height={140} style={{ width: "100%", height: 140, display: "block" }} />;
}

                      borderRadius: 4, border: `1px solid ${MB.border}`,

                      <span style={{ fontSize: 10, color: accent, letterSpacing: 1, fontWeight: 600 }}>{cr}</span>
                      <span style={{ fontSize: 10, color: MB.textMuted, flex: 1 }}>
                        {(CR_EVENTS.find(e => e.id === cr) || {}).label || "Change-Request"}
                      </span>
                      <span style={{ fontSize: 9, color: MB.green }}>●</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>

        <div style={{
          background: `linear-gradient(135deg, ${accent}11, transparent)`,
          border: `1px solid ${accent}44`,
          borderLeft: `3px solid ${accent}`,
          borderRadius: 8, padding: "14px 18px",
        }}>
          <div style={{ fontSize: 10, color: accent, letterSpacing: 2, marginBottom: 6 }}>
            ◈ MO360 RECOMMENDATION
          </div>
          <div style={{ fontSize: 12, color: MB.text, lineHeight: 1.55 }}>
            {noData ? `Datenbasis zu gering (${Math.round(factor*100)}% Coverage). Bitte mindestens GuK + IFQS aktivieren für valide Aussage zu ${part.label}.`
              : effStatus === "critical"
              ? `Sofortmaßnahme empfohlen: ${part.label} zeigt überdurchschnittliche Reklamationsdichte. Tear-Down-Analyse von 12 Fahrzeugen aus betroffener Charge anfordern, FMEA re-validieren.`
              : effStatus === "warn"
              ? `Aufmerksamkeit erforderlich: ${part.label} mit erhöhter PPH gegenüber Vergleichsperiode. Lieferanten-Audit und Verbatim-Cluster-Drill-Down prüfen.`
              : `${part.label} im grünen Bereich. Routine-Monitoring fortsetzen. Verbatim-Volumen unauffällig.`}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── VEHICLE INSPECTION PANEL ─────────────────────────────────────────────────
function VehicleInspectionPanel({ role }) {
  const [activeCategory, setActiveCategory] = useState("exterieur");
  const [selectedPart, setSelectedPart] = useState(null);
  const [activeSources, setActiveSources] = useState(
    SOURCE_BADGES.filter(b => b.defaultActive).map(b => b.id)
  );
  const factor = calcDataFactor(activeSources);
  const parts = PARTS_BY_CATEGORY[activeCategory] || [];
  const accent = role.accentColor;

  return (
    <div style={{
      flex: 1, minHeight: 480,
      background: MB.surface,
      border: `1px solid ${MB.border}`,
      borderRadius: 8, overflow: "hidden",
      display: "flex", flexDirection: "column",
    }}>
      <div style={{
        padding: "14px 22px", borderBottom: `1px solid ${MB.border}`,
        display: "flex", justifyContent: "space-between", alignItems: "center",
      }}>
        <div style={{ fontSize: 10, color: MB.textMuted, letterSpacing: 2 }}>
          VEHICLE INSPECTION · S-CLASS W223 · {selectedPart ? `> ${selectedPart.label.toUpperCase()}` : "OVERVIEW"}
        </div>
        <div style={{ fontSize: 9, color: MB.textSubtle, letterSpacing: 1.5 }}>
          Malfunction.mercedes-benz.internal / dashboard
        </div>
      </div>

      <div style={{ flex: 1, display: "flex", padding: 18, gap: 0, overflow: "hidden" }}>
        <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden", minWidth: 0 }}>
          {!selectedPart && (
            <SourceBadgeRow
              activeSources={activeSources}
              setActiveSources={setActiveSources}
              factor={factor}
            />
          )}
          {!selectedPart && (
            <PartCategoryTabs active={activeCategory} setActive={setActiveCategory} accent={accent} />
          )}
          {!selectedPart ? (
            <div style={{
              flex: 1, marginTop: 16,
              display: "grid", gridTemplateColumns: "repeat(3, 1fr)",
              gap: 12, alignContent: "start",
              overflow: "auto", paddingRight: 4, paddingBottom: 4,
            }}>
              {parts.map(p => (
                <PartTile key={p.id} part={p} accent={accent}
                  factor={factor}
                  onClick={() => setSelectedPart(p)} />
              ))}
            </div>
          ) : (
            <PartDetailView
              part={selectedPart}
              category={PART_CATEGORIES.find(c => c.id === activeCategory)?.label || ""}
              onBack={() => setSelectedPart(null)}
              accent={accent}
              factor={factor}
            />
          )}
        </div>

        <VehicleSpecsSidebar activeCategory={activeCategory} factor={factor} parts={parts} />
      </div>
    </div>
  );
}


// ─── MAIN DASHBOARD ───────────────────────────────────────────────────────────
function Dashboard({ role, onBack }) {
  const [activePartId, setActivePartId] = useState(null);
  const [activeCluster, setActiveCluster] = useState(null);
  const [scrubberDay, setScrubberDay] = useState(45);
  const [activeTab, setActiveTab] = useState("vehicle");
  const [chatOpen, setChatOpen] = useState(true);

  const kpis = KPI_BY_ROLE[role.id] || KPI_BY_ROLE.quality;
  const anomalies = kpis.filter(k => k.status !== "good").length;

  const nearestCR = CR_EVENTS.reduce((acc, ev) => {
    const dist = Math.abs(ev.date - scrubberDay);
    return dist < Math.abs(acc.date - scrubberDay) ? ev : acc;
  }, CR_EVENTS[0]);

  const TABS = [
    { id: "vehicle", label: "Vehicle", icon: "◈" },
    { id: "verbatim", label: "Verbatim", icon: "◇" },
    { id: "timeline", label: "Timeline", icon: "⏤" },
  ];

  return (
    <div style={{
      minHeight: "100vh",
      background: MB.black,
      fontFamily: "'DM Sans', 'Helvetica Neue', sans-serif",
      color: MB.text,
      display: "flex",
      flexDirection: "column",
    }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@400;700&display=swap');
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
        @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-20px)} }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #2A2A2A; border-radius: 2px; }
        input::placeholder { color: #4A4A4A; }
      `}</style>

      {/* ── HEADER ── */}
      <header style={{
        background: MB.anthracite,
        borderBottom: `1px solid ${MB.border}`,
        padding: "0 24px",
        height: 52,
        display: "flex", alignItems: "center", gap: 20,
        flexShrink: 0,
      }}>
        {/* Back + Logo */}
        <button onClick={onBack} style={{
          background: "none", border: "none", cursor: "pointer",
          color: MB.textMuted, fontSize: 14, padding: 0, fontFamily: "inherit",
          display: "flex", alignItems: "center", gap: 6,
          transition: "color 0.2s",
        }}
        onMouseEnter={e => e.currentTarget.style.color = MB.white}
        onMouseLeave={e => e.currentTarget.style.color = MB.textMuted}
        >
          ← <span style={{ fontSize: 10, letterSpacing: 2 }}>EXIT</span>
        </button>

        <div style={{ width: 1, height: 24, background: MB.border }} />

        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ color: MB.silver, fontSize: 18 }}>✦</span>
          <div>
            <span style={{ fontSize: 14, fontWeight: 600, letterSpacing: 3, color: MB.white }}>MO360</span>
            <span style={{ fontSize: 14, fontWeight: 300, letterSpacing: 3, color: MB.accent }}> Malfunction</span>
          </div>
        </div>

        {/* Role badge */}
        <div style={{
          background: MB.surfaceCard, border: `1px solid ${MB.border}`,
          borderTop: `1px solid ${role.accentColor}`,
          borderRadius: 4, padding: "4px 12px",
          display: "flex", alignItems: "center", gap: 6,
        }}>
          <span style={{ color: role.accentColor, fontSize: 12 }}>{role.icon}</span>
          <span style={{ fontSize: 11, color: MB.silver, letterSpacing: 1.5 }}>{role.title.toUpperCase()}</span>
        </div>

        <div style={{ flex: 1 }} />

        {/* Vehicle context */}
        <div style={{ textAlign: "right" }}>
          <div style={{ fontSize: 12, color: MB.silver, letterSpacing: 1 }}>S-Class · W223</div>
          <div style={{ fontSize: 9, color: MB.textMuted, letterSpacing: 1.5 }}>VITORIA · AE · PROD. 04/21</div>
        </div>

        {/* Anomaly alert */}
        {anomalies > 0 && (
          <div style={{
            background: MB.red + "18", border: `1px solid ${MB.red}44`,
            borderRadius: 16, padding: "4px 12px",
            display: "flex", alignItems: "center", gap: 6,
          }}>
            <div style={{ width: 6, height: 6, borderRadius: "50%", background: MB.red, animation: "pulse 2s infinite" }} />
            <span style={{ fontSize: 11, color: MB.red }}>{anomalies} Alerts</span>
          </div>
        )}

        {/* AI Toggle */}
        <button onClick={() => setChatOpen(!chatOpen)} style={{
          background: chatOpen ? MB.accent + "18" : "transparent",
          border: `1px solid ${chatOpen ? MB.accent : MB.border}`,
          borderRadius: 6, padding: "6px 14px",
          color: chatOpen ? MB.accent : MB.textMuted,
          fontSize: 10, cursor: "pointer",
          fontFamily: "inherit", letterSpacing: 2, transition: "all 0.2s",
        }}>◈ AI</button>
      </header>

      {/* ── BODY ── */}
      <div style={{ flex: 1, display: "flex", overflow: "hidden" }}>

        {/* ── LEFT: MAIN CONTENT ── */}
        <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>

          {/* Tab bar */}
          <div style={{
            display: "flex", gap: 0, borderBottom: `1px solid ${MB.border}`,
            background: MB.anthracite, padding: "0 24px", flexShrink: 0,
          }}>
            {TABS.map(tab => (
              <button key={tab.id} onClick={() => setActiveTab(tab.id)} style={{
                background: "none", border: "none",
                borderBottom: `2px solid ${activeTab === tab.id ? role.accentColor : "transparent"}`,
                padding: "10px 20px",
                color: activeTab === tab.id ? MB.white : MB.textMuted,
                fontSize: 11, cursor: "pointer", fontFamily: "inherit",
                letterSpacing: 2, transition: "all 0.2s",
                display: "flex", alignItems: "center", gap: 6,
              }}>
                <span style={{ color: activeTab === tab.id ? role.accentColor : MB.textSubtle }}>{tab.icon}</span>
                {tab.label.toUpperCase()}
              </button>
            ))}
          </div>

          {/* Main panels */}
          <div style={{ flex: 1, overflow: "auto", padding: 20, display: "flex", flexDirection: "column", gap: 16 }}>

            {/* KPI Row */}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(6, 1fr)", gap: 10, flexShrink: 0 }}>
              {kpis.map((kpi, i) => <KPICard key={i} kpi={kpi} accent={role.accentColor} />)}
            </div>

            {/* VEHICLE TAB — tile-based inspection */}
            {activeTab === "vehicle" && (
              <VehicleInspectionPanel role={role} />
            )}

            {/* VERBATIM TAB */}
            {activeTab === "verbatim" && (
              <div style={{
                flex: 1, minHeight: 420,
                background: MB.surface,
                border: `1px solid ${MB.border}`,
                borderRadius: 8, overflow: "hidden",
              }}>
                <div style={{ padding: "14px 20px", borderBottom: `1px solid ${MB.border}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div style={{ fontSize: 10, color: MB.textMuted, letterSpacing: 2 }}>VERBATIM CLUSTER ANALYSIS · {VERBATIM_CLUSTERS.reduce((a, c) => a + c.count, 0)} ENTRIES</div>
                  <div style={{ display: "flex", gap: 8 }}>
                    {[{ c: MB.red, l: "High" }, { c: MB.amber, l: "Medium" }, { c: MB.accent, l: "Low" }].map(s => (
                      <div key={s.l} style={{ display: "flex", alignItems: "center", gap: 5 }}>
                        <div style={{ width: 6, height: 6, borderRadius: "50%", background: s.c }} />
                        <span style={{ fontSize: 9, color: MB.textMuted, letterSpacing: 1 }}>{s.l.toUpperCase()}</span>
                      </div>
                    ))}
                  </div>
                </div>
                <div style={{ height: "calc(100% - 48px)", padding: 16 }}>
                  <VerbatimClusters onClusterClick={setActiveCluster} activeCluster={activeCluster} />
                </div>
              </div>
            )}

            {/* TIMELINE TAB */}
            {activeTab === "timeline" && (
              <div style={{ flex: 1 }}>
                <div style={{
                  background: MB.surface, border: `1px solid ${MB.border}`,
                  borderRadius: 8, overflow: "hidden", marginBottom: 16,
                }}>
                  <div style={{ padding: "14px 20px", borderBottom: `1px solid ${MB.border}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div style={{ fontSize: 10, color: MB.textMuted, letterSpacing: 2 }}>PPH TIMELINE · 90 DAYS · DRAG SCRUBBER</div>
                    <div style={{ fontSize: 10, color: MB.accent }}>
                      {nearestCR.id}: {nearestCR.label}
                    </div>
                  </div>
                  <div style={{ padding: "16px 20px" }}>
                    <TimelineScrubber scrubberDay={scrubberDay} setScrubberDay={setScrubberDay} />
                  </div>
                </div>

                {/* CR Event detail */}
                <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 10 }}>
                  {CR_EVENTS.map(ev => {
                    const isActive = scrubberDay >= ev.date;
                    const col = ev.impact === "high" ? MB.red : ev.impact === "medium" ? MB.amber : MB.accent;
                    return (
                      <div key={ev.id} style={{
                        background: MB.surfaceCard,
                        border: `1px solid ${isActive ? col + "44" : MB.border}`,
                        borderLeft: `3px solid ${isActive ? col : MB.border}`,
                        borderRadius: 8, padding: "14px 16px",
                        opacity: isActive ? 1 : 0.4, transition: "all 0.3s",
                      }}>
                        <div style={{ fontSize: 9, color: col, letterSpacing: 1.5, marginBottom: 6 }}>{ev.id} · DAY {ev.date}</div>
                        <div style={{ fontSize: 13, fontWeight: 600, color: MB.white, marginBottom: 4 }}>{ev.label}</div>
                        <div style={{ fontSize: 9, color: MB.textMuted, textTransform: "uppercase", letterSpacing: 1 }}>{ev.domain} · {ev.impact} impact</div>
                        <div style={{ marginTop: 8, fontSize: 10, color: isActive ? MB.green : MB.textSubtle }}>
                          {isActive ? "● ACTIVE" : "○ PENDING"}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        </div>

        {/* ── RIGHT: AI CHAT ── */}
        {chatOpen && (
          <div style={{
            width: 340, flexShrink: 0,
            borderLeft: `1px solid ${MB.border}`,
            background: MB.anthracite,
            display: "flex", flexDirection: "column",
            animation: "fadeUp 0.3s ease",
          }}>
            <AIChat
              role={role}
              contextPart={activePartId}
              contextCluster={activeCluster}
            />
          </div>
        )}
      </div>
    </div>
  );
}

// ─── ROOT ─────────────────────────────────────────────────────────────────────
function App() {
  const [selectedRole, setSelectedRole] = useState(null);

  if (!selectedRole) {
    return <LandingPage onRoleSelect={setSelectedRole} />;
  }

  return <Dashboard role={selectedRole} onBack={() => setSelectedRole(null)} />;
}

// ─── MOUNT ────────────────────────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

  </script>
</body>
</html>
